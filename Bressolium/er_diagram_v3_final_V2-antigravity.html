<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrama E-R — Civilización Cooperativa v3 (V2-antigravity)</title>
    <style>
        body {
            font-family: sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            margin: 0;
            padding: 1.5rem;
        }

        h1 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: #2E4057;
        }

        p {
            font-size: 13px;
            color: #666;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        #erd {
            width: 100%;
            overflow-x: auto;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #e0e0e0;
            }

            h1 {
                color: #7eb8f7;
            }

            p {
                color: #aaa;
            }
        }
    </style>
</head>

<body>
    <h1>Diagrama Entidad-Relación</h1>
    <p>Civilización Cooperativa — MVP v2-antigravity (Simplificado con JSON State)</p>
    <div id="erd"></div>
    <script type="module">
        import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
        const dark = matchMedia('(prefers-color-scheme: dark)').matches;
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            fontFamily: 'sans-serif',
            themeVariables: {
                darkMode: dark,
                fontSize: '13px',
                fontFamily: 'sans-serif',
                primaryColor: dark ? '#2a2a3a' : '#e8eaf6',
                primaryTextColor: '#1a1a2e',
                primaryBorderColor: dark ? '#5c5c8a' : '#7986cb',
                lineColor: dark ? '#9c9a92' : '#73726c',
                textColor: dark ? '#c2c0b6' : '#3d3d3a',
                attributeBackgroundColorEven: dark ? '#1e1e2e' : '#f5f5ff',
                attributeBackgroundColorOdd: dark ? '#252535' : '#ffffff',
            },
        });
        const diagram = `erDiagram
  USER {
    uuid id PK
    string nombre
    string email
    string password_hash
  }
  PARTIDA {
    uuid id PK
    int puntos
    string estado
    json estado_jornada "Almacenará el estado temporal de la jornada, votos y acciones restantes"
  }
  CASILLA {
    uuid id PK
    int coord_x
    int coord_y
    boolean explorada
    uuid jugador_asignado FK
    uuid tipo_casilla_id FK
    uuid partida_id FK
  }
  TIPO_CASILLA {
    uuid id PK
    string nombre
    int nivel
  }
  MATERIAL {
    uuid id PK
    string nombre
  }
  INVENTO {
    uuid id PK
    string nombre
    int nivel
  }
  TECNOLOGIA {
    uuid id PK
    string nombre
    int nivel
  }
  RECETA {
    uuid id PK
    string tipo "INVENTO o TECNOLOGIA"
    uuid material_id FK
    int cantidad
    uuid invento_id FK "Puede ser Nulo si es para Tecnología"
    uuid tecnologia_id FK "Puede ser Nulo si es para Invento"
  }

  USER ||--o{ PARTIDA : "pertenece (N:M)"
  PARTIDA ||--|{ CASILLA : "formada por (1:N)"
  CASILLA }o--|| USER : "asignada a"
  CASILLA }o--|| TIPO_CASILLA : "tiene un tipo"
  TIPO_CASILLA }o--o{ MATERIAL : "produce (cantidad)"
  TIPO_CASILLA }o--o{ TECNOLOGIA : "requiere (nombre_tecnologia)"
  TIPO_CASILLA }o--o{ INVENTO : "requiere (nombre_invento)"
  PARTIDA }o--o{ MATERIAL : "tiene (cantidad, esta_activo)"
  MATERIAL ||--o{ RECETA : "compuesta de (cantidad)"
  TECNOLOGIA ||--o{ RECETA : "requerida en"
  INVENTO ||--o{ RECETA : "requerido en"
  RECETA }o--|| MATERIAL : "consume"
  RECETA }o--|| INVENTO : "produce"
  RECETA }o--|| TECNOLOGIA : "produce"
  INVENTO }o--o{ INVENTO : "desbloquea"
  INVENTO }o--o{ TECNOLOGIA : "desbloquea"
  TECNOLOGIA }o--o{ TECNOLOGIA : "desbloquea"
`;
        const { svg } = await mermaid.render('erd-svg', diagram);
        document.getElementById('erd').innerHTML = svg;
        document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
            const firstPath = node.querySelector('path[d]');
            if (!firstPath) return;
            const d = firstPath.getAttribute('d');
            const nums = d.match(/-?[\d.]+/g)?.map(Number);
            if (!nums || nums.length < 8) return;
            const xs = [nums[0], nums[2], nums[4], nums[6]];
            const ys = [nums[1], nums[3], nums[5], nums[7]];
            const x = Math.min(...xs), y = Math.min(...ys);
            const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', x); rect.setAttribute('y', y);
            rect.setAttribute('width', w); rect.setAttribute('height', h);
            rect.setAttribute('rx', '8');
            for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
                if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
            }
            firstPath.replaceWith(rect);
        });
        document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
            p.setAttribute('stroke', 'none');
        });
        document.querySelectorAll('#erd svg text').forEach(t => {
            const txt = t.textContent.trim();
            const isHeader = ['USER', 'PARTIDA', 'CASILLA', 'TIPO_CASILLA', 'MATERIAL', 'INVENTO', 'TECNOLOGIA', 'RECETA'].includes(txt);
            if (isHeader) t.style.fill = '#1a1a2e';
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagrama E-R — Civilización Cooperativa v3 (Relacional Pura)</title>
  <style>
    body {
      font-family: sans-serif;
      background: #ffffff;
      color: #141313;
      margin: 0;
      padding: 1.5rem;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: #2E4057;
    }

    p {
      font-size: 13px;
      color: #0d0d0d;
      margin-top: 0;
      margin-bottom: 1.5rem;
    }

    #erd {
      width: 100%;
      overflow-x: auto;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #fcfbfb;
        color: #080808;
      }

      h1 {
        color: #7eb8f7;
      }

      p {
        color: #0b0b0b;
      }
    }
  </style>
</head>

<body>
  <h1>Diagrama Entidad-Relación V3</h1>
  <p>Civilización Cooperativa — MVP (Relacional Normalizado: Sin JSON, Sin Puntos)</p>
  <div id="erd"></div>
  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'sans-serif',
      themeVariables: {
        darkMode: dark,
        fontSize: '13px',
        primaryColor: dark ? '#2a2a3a' : '#e8eaf6',
        primaryTextColor: '#1a1a2e',
      },
    });
    const diagram = `erDiagram
  USER {
    uuid id PK
    string nombre
    string email
    string password
  }
  PARTIDA {
    uuid id PK
    string nombre "Nombre único del equipo"
    enum estado "ACTIVA, FINALIZADA"
  }
  JORNADA {
    uuid id PK
    uuid partida_id FK
    int numero "Contador de turnos"
    timestamp fecha_inicio
  }
  JORNADA_USER {
    uuid jornada_id PK,FK
    uuid user_id PK,FK
    int acciones_gastadas "Máximo 2 por turno"
  }
  VOTO {
    uuid id PK
    uuid jornada_id FK
    uuid user_id FK
    uuid tecnologia_id FK
  }
  CASILLA {
    uuid id PK
    uuid partida_id FK
    uuid user_id FK "Asignada a"
    uuid tipo_casilla_id FK
    int coord_x
    int coord_y
    int nivel
    boolean explorada
  }
  TIPO_CASILLA {
    uuid id PK
    string nombre
    int nivel
  }
  MATERIAL {
    uuid id PK
    string nombre
  }
  INVENTO {
    uuid id PK
    string nombre
  }
  TECNOLOGIA {
    uuid id PK
    string nombre
  }
  RECETA {
    uuid id PK
    uuid material_id FK
    int cantidad
    uuid invento_id FK "Nullable"
    uuid tecnologia_id FK "Nullable"
  }

  USER ||--o{ PARTIDA : "juega en"
  PARTIDA ||--|{ JORNADA : "tiene"
  JORNADA ||--|{ JORNADA_USER : "estado usuarios"
  JORNADA ||--o{ VOTO : "recibe"
  PARTIDA ||--|{ CASILLA : "terreno"
  CASILLA }o--|| TIPO_CASILLA : "es tipo"
  MATERIAL ||--o{ RECETA : "necesario"
  TECNOLOGIA ||--o{ RECETA : "produce"
  INVENTO ||--o{ RECETA : "produce"
`;
    const { svg } = await mermaid.render('erd-v3', diagram);
    document.getElementById('erd').innerHTML = svg;
  </script>
</body>

</html>

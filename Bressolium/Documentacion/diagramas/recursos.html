<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caselles — Árbol de Recursos</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #111827; color: #e5e7eb; overflow: hidden; height: 100vh; }

.header {
  background: #1f2937; border-bottom: 1px solid #374151;
  padding: 10px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; height: 54px;
}
.header h1 { font-size: 18px; color: #fbbf24; white-space: nowrap; }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
button {
  padding: 5px 10px; background: #374151; color: #d1d5db;
  border: 1px solid #4b5563; border-radius: 4px; cursor: pointer; font-size: 12px;
}
button:hover { background: #4b5563; }
button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
input[type=text] {
  padding: 5px 10px; background: #374151; color: #e5e7eb;
  border: 1px solid #4b5563; border-radius: 4px; font-size: 12px; width: 180px;
}

.layout { display: flex; height: calc(100vh - 54px); }
.graph-wrap { flex: 1; overflow: hidden; position: relative; }
svg { width: 100%; height: 100%; cursor: grab; }
svg.grabbing { cursor: grabbing; }

.panel {
  width: 300px; background: #1f2937; border-left: 1px solid #374151;
  padding: 16px; overflow-y: auto; font-size: 13px;
}
.panel h2 { font-size: 15px; color: #fbbf24; margin-bottom: 6px; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #111;
}
.section-title { color: #9ca3af; font-size: 11px; text-transform: uppercase; margin: 10px 0 4px; letter-spacing: .05em; }
.item { background: #111827; border-left: 3px solid #3b82f6; padding: 4px 8px; margin-bottom: 3px; font-size: 12px; }
.item.cost { border-color: #6b7280; background: #0f172a; }
.empty { color: #6b7280; font-style: italic; font-size: 13px; margin-top: 40px; text-align: center; }

/* Legend */
.legend {
  position: absolute; bottom: 16px; left: 16px;
  background: rgba(31,41,55,0.95); border: 1px solid #374151;
  border-radius: 6px; padding: 10px 14px; font-size: 12px; pointer-events: none;
}
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-rect { width: 14px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* Edge lines */
.link { fill: none; }
.link-cost { stroke: #4b5563; stroke-width: 1; stroke-opacity: .5; }
.link-prereq { stroke: #f97316; stroke-width: 1.5; stroke-opacity: .7; }
.link-prereq-inv { stroke: #f59e0b; stroke-width: 1.5; stroke-dasharray: 6,3; stroke-opacity: .7; }
.link-enables { stroke: #a78bfa; stroke-width: 1.5; stroke-dasharray: 5,4; stroke-opacity: .7; }
.link-produces { stroke: #22d3ee; stroke-width: 1.5; stroke-dasharray: 3,3; stroke-opacity: .7; }

/* Nodes */
.node circle, .node rect { stroke-width: 1.5; cursor: pointer; }
.node circle:hover, .node rect:hover { stroke-width: 3; }
.node text { pointer-events: none; font-size: 10px; fill: #d1d5db; }

.dimmed { opacity: .08 !important; }
.highlighted { opacity: 1 !important; }
</style>
</head>
<body>

<div class="header">
  <h1>🎮 Caselles — Árbol de Recursos</h1>
  <div class="filter-group">
    <button class="filter-btn active" data-f="all">Todos</button>
    <button class="filter-btn" data-f="raw">Crudos</button>
    <button class="filter-btn" data-f="advanced">Avanzados</button>
    <button class="filter-btn" data-f="tile">Casillas</button>
    <button class="filter-btn" data-f="invention">Inventos</button>
    <button class="filter-btn" data-f="tech">Tecnología</button>
  </div>
  <input type="text" id="search" placeholder="Buscar nodo...">
  <button id="resetBtn">Reiniciar vista</button>
</div>

<div class="layout">
  <div class="graph-wrap" id="graphWrap">
    <svg id="svg"></svg>
    <div class="legend">
      <div class="legend-row"><div class="legend-dot" style="background:#4ade80"></div> Recurso crudo</div>
      <div class="legend-row"><div class="legend-dot" style="background:#22d3ee"></div> Recurso avanzado</div>
      <div class="legend-row"><div class="legend-rect" style="background:#0d9488"></div> Casilla nv5</div>
      <div class="legend-row"><div class="legend-dot" style="background:#fb923c"></div> Invento</div>
      <div class="legend-row"><div class="legend-dot" style="background:#60a5fa"></div> Tecnología</div>
      <div class="legend-row"><div class="legend-dot" style="background:#fbbf24"></div> Victoria</div>
      <hr style="border-color:#374151;margin:6px 0">
      <div class="legend-row"><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" class="link link-cost"/></svg> Coste</div>
      <div class="legend-row"><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" class="link link-prereq"/></svg> Prerrequisito</div>
      <div class="legend-row"><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" class="link link-prereq-inv"/></svg> Prereq. Invento</div>
      <div class="legend-row"><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" class="link link-enables"/></svg> Desbloquea</div>
      <div class="legend-row"><svg width="30" height="10"><line x1="0" y1="5" x2="30" y2="5" class="link link-produces"/></svg> Produce</div>
    </div>
  </div>
  <div class="panel" id="panel">
    <p class="empty">Haz clic en un nodo<br>para ver detalles</p>
  </div>
</div>

// ── LAYOUT ──────────────────────────────────────────────────────────────────
const TIERS = 11;
const CANVAS_W = 5500;
const NODE_SPACING = 72;  // minimum vertical gap between nodes

// Compute TREE1_H dynamically so the busiest tier always fits
const nodesByTier = {};
NODES.forEach(n => { nodesByTier[n.tier] = (nodesByTier[n.tier] || 0) + 1; });
const maxNodesInTier = Math.max(...Object.values(nodesByTier));
const TREE1_H = Math.max(3200, maxNodesInTier * NODE_SPACING + 200);

const TREE_GAP = 200;
// T2_BOX_H is dynamic per cell — compute max resources in any nv1-4 level to set row height
const T2_LINE_H = 13;   // px per resource line
const T2_PADDING = 28;  // top padding + bottom tech badge space
const T2_BOX_W = 210;
// Max resources in a nv1-4 level is 4 (nv4 always has 4). With tech badge: 4*13 + 28 = 80px box.
const T2_BOX_H = 4 * T2_LINE_H + T2_PADDING;  // 80px
const T2_ROW_GAP = 24;  // gap between level rows
const T2_LVL_H = T2_BOX_H + T2_ROW_GAP;       // 104px per level row
// nv5 box is taller (up to 4 resources + req badge)
const T2_BOX5_H = T2_BOX_H + 20;
const TREE2_H = 5 * T2_LVL_H + T2_BOX5_H + 80;
const CANVAS_H = TREE1_H + TREE_GAP + TREE2_H;
const MARGIN_X = 160;
const tierX = tier => MARGIN_X + (tier / (TIERS - 1)) * (CANVAS_W - MARGIN_X * 2);

// Group raw nodes by group, spread vertically within group
const groups = ["Bosque","Cantera","Río","Prado","Veta"];
const groupColors = {Bosque:"#15803d",Cantera:"#78716c",Río:"#0284c7",Prado:"#65a30d",Veta:"#92400e"};
const rawByGroup = {};
groups.forEach((g, gi) => {
  rawByGroup[g] = NODES.filter(n => n.type === "raw" && n.group === g);
});

// Assign initial Y for raw nodes — evenly spread in their group band
NODES.filter(n => n.type === "raw").forEach(n => {
  const list = rawByGroup[n.group];
  const idx = list.indexOf(n);
  const count = list.length;
  const bandH = TREE1_H / groups.length;
  const gi = groups.indexOf(n.group);
  n.y = (gi * bandH) + ((idx + 0.5) / count) * bandH;
  n.x = tierX(n.tier);
});

// Pre-distribute non-raw nodes evenly by tier so the simulation starts spread out
const nonRawByTier = {};
NODES.filter(n => n.type !== "raw").forEach(n => {
  (nonRawByTier[n.tier] = nonRawByTier[n.tier] || []).push(n);
});
Object.entries(nonRawByTier).forEach(([tier, list]) => {
  const count = list.length;
  list.forEach((n, i) => {
    n.x = tierX(Number(tier));
    // Spread evenly across TREE1_H with padding
    n.y = 80 + (i / Math.max(count - 1, 1)) * (TREE1_H - 160);
  });
});

// Run force simulation — Y only (X is fixed per tier)
const sim = d3.forceSimulation(NODES)
  .force("collide", d3.forceCollide(NODE_SPACING / 2).strength(1).iterations(6))
  .force("y", d3.forceY(d => {
    if (d.type === "raw") return d.y;
    return TREE1_H / 2;
  }).strength(d => d.type === "raw" ? 0.9 : 0.02))
  .force("link", d3.forceLink(edges)
    .id(d => d.id)
    .distance(140)
    .strength(0.015))
  .stop();

// Fix X for all nodes after assigning positions
NODES.forEach(n => { n.fx = tierX(n.tier); });

// Run more ticks to let the busy tiers fully settle
for (let i = 0; i < 800; i++) sim.tick();

// Clamp Y to tree1 area
NODES.forEach(n => {
  n.y = Math.max(40, Math.min(TREE1_H - 40, n.y));
  n.x = n.fx;
});

// ── SECOND TREE: Tile Evolution ───────────────────────────────────────────────
const T2_Y = TREE1_H + TREE_GAP;   // top of second tree

const tree2G = g.append("g").attr("class","tree2");

  .attr("x2",120).attr("y2", T2_Y + TREE2_H)

TILE_TREE.forEach((tile, ti) => {
  const cx = 120 + T2_COL_W * ti + T2_COL_W / 2;

  // Column header (tile name)
  tree2G.append("rect")
    .attr("x", cx - T2_BOX_W/2).attr("y", T2_Y - 54)
    .attr("width", T2_BOX_W).attr("height", 34)
    .attr("rx", 4)
    .attr("fill", tile.color).attr("fill-opacity", 0.3)

  tree2G.append("text")
    .attr("x", cx).attr("y", T2_Y - 37)
    .attr("text-anchor","middle")
    .attr("dominant-baseline","middle")
    .attr("font-size","13px").attr("font-weight","bold")
    .attr("fill", tile.color)
    .text(tile.name);

  // Levels 1-4
  tile.levels.forEach((lvl, li) => {
    const by = T2_Y + li * T2_LVL_H + 10;
    const isLast = li === tile.levels.length - 1;
    const nRes = lvl.resources.length;
    const boxH = nRes * T2_LINE_H + T2_PADDING;  // exact height for this level

    // Box — height fits all resources
    tree2G.append("rect")
      .attr("x", cx - T2_BOX_W/2).attr("y", by)
      .attr("width", T2_BOX_W).attr("height", boxH)
      .attr("rx", 4)
      .attr("fill", tile.color).attr("fill-opacity", 0.1)
      .attr("stroke", tile.color).attr("stroke-width", isLast ? 2 : 1)
      .attr("stroke-opacity", isLast ? 0.8 : 0.4);

    // Level label inside box (top-left)
    tree2G.append("text")
      .attr("x", cx - T2_BOX_W/2 + 6).attr("y", by + 10)
      .attr("font-size","8px")
      .attr("fill", tile.color).attr("fill-opacity", 0.8)
      .attr("font-weight","bold")
      .text(`Nv${lvl.lvl}`);

    // All resources — no truncation
    lvl.resources.forEach((line, lineIdx) => {
      tree2G.append("text")
        .attr("x", cx).attr("y", by + 14 + lineIdx * T2_LINE_H)
        .attr("text-anchor","middle")
        .attr("font-size","9px")
        .attr("fill","#d1d5db")
        .text(line);
    });

    // Tech badge if required
    if (lvl.tech) {
      tree2G.append("text")
        .attr("x", cx).attr("y", by + boxH - 5)
        .attr("text-anchor","middle")
        .attr("font-size","8px")
        .attr("fill","#60a5fa")
        .text("🔬 " + lvl.tech);
    }

    // Arrow down to next level
    if (li < 4) {
      const arrowY1 = by + boxH;
      const nextBy = li === 3
        ? T2_Y + 4 * T2_LVL_H + 10   // to lvl5 box
        : T2_Y + (li + 1) * T2_LVL_H + 10;
      const arrowColor = li === 3 ? "#fbbf24" : tile.color;

      tree2G.append("line")
        .attr("x1", cx).attr("y1", arrowY1 + 3)
        .attr("x2", cx).attr("y2", nextBy - 8)
        .attr("stroke", arrowColor).attr("stroke-width", li === 3 ? 2 : 1)
        .attr("stroke-opacity", li === 3 ? 1 : 0.5)
        .attr("stroke-dasharray", li === 3 ? "6,3" : null);

      tree2G.append("polygon")
        .attr("points", `${cx-5},${nextBy-8} ${cx+5},${nextBy-8} ${cx},${nextBy}`)
        .attr("fill", arrowColor)
        .attr("opacity", li === 3 ? 1 : 0.5);

  const lvl5y = T2_Y + 4 * T2_LVL_H + 10;
  const l5 = tile.lvl5;

  const nRes5 = l5.resources.length;
  const box5H = 18 + nRes5 * T2_LINE_H + 20;  // name row + resources + req badge

  tree2G.append("rect")
    .attr("x", cx - T2_BOX_W/2 - 8).attr("y", lvl5y)
    .attr("width", T2_BOX_W + 16).attr("height", box5H)
    .attr("rx", 6)
    .attr("fill", l5.color).attr("fill-opacity", 0.2)
    .attr("stroke", l5.color).attr("stroke-width", 2.5);

  // Star + Name row
  tree2G.append("text")
    .attr("x", cx - T2_BOX_W/2 + 4).attr("y", lvl5y + 14)
    .attr("font-size","11px").attr("fill","#fbbf24")
    .text("★");

  tree2G.append("text")
    .attr("x", cx + 6).attr("y", lvl5y + 14)
    .attr("text-anchor","middle")
    .attr("font-size","10px").attr("font-weight","bold")
    .attr("fill", l5.color)
    .text(l5.name.length > 22 ? l5.name.slice(0,20)+"…" : l5.name);

  // All resources — no truncation
  l5.resources.forEach((r, ri) => {
    tree2G.append("text")
      .attr("x", cx).attr("y", lvl5y + 26 + ri * T2_LINE_H)
      .attr("text-anchor","middle")
      .attr("font-size","9px")
      .attr("fill","#22d3ee")
      .text(r);
  });

  // Tech + inv requirement
  const reqText = l5.inv ? `🔬 ${l5.tech}  +  🔧 ${l5.inv}` : `🔬 ${l5.tech}`;
  tree2G.append("text")
    .attr("x", cx).attr("y", lvl5y + box5H - 5)
    .attr("text-anchor","middle")
    .attr("font-size","8px")
    .attr("fill","#a78bfa")
    .text(reqText);
});

// ── ZOOM & PAN ───────────────────────────────────────────────────────────────
const zoom = d3.zoom()
  .scaleExtent([0.05, 4])
  .on("zoom", e => g.attr("transform", e.transform));

svg.call(zoom);

// Initial fit
const initialScale = Math.min(W / CANVAS_W, H / CANVAS_H) * 0.9;
const initialTx = (W - CANVAS_W * initialScale) / 2;
const initialTy = (H - CANVAS_H * initialScale) / 2;
svg.call(zoom.transform, d3.zoomIdentity.translate(initialTx, initialTy).scale(initialScale));

svg.on("mousedown.grabbing", () => svg.classed("grabbing", true));
svg.on("mouseup.grabbing", () => svg.classed("grabbing", false));

document.getElementById("resetBtn").addEventListener("click", () => {
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(initialTx, initialTy).scale(initialScale));
  clearSearch();
});

// ── HIGHLIGHT ────────────────────────────────────────────────────────────────
function highlight(d) {
  const connectedIds = new Set([d.id]);
  edges.forEach(e => {
    if (e.sourceId === d.id) connectedIds.add(e.targetId);
    if (e.targetId === d.id) connectedIds.add(e.sourceId);
  });
  nodeEls.classed("dimmed", n => !connectedIds.has(n.id));
  nodeEls.classed("highlighted", n => connectedIds.has(n.id));
  linkEls.classed("dimmed", e => e.sourceId !== d.id && e.targetId !== d.id);
  // Show cost labels for connected cost edges
  costLabels.attr("opacity", e => (e.sourceId === d.id || e.targetId === d.id) ? 1 : 0);
}

function unhighlight() {
  nodeEls.classed("dimmed highlighted", false);
  linkEls.classed("dimmed", false);
  costLabels.attr("opacity", 0);
}

// ── FILTER ────────────────────────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const f = btn.dataset.f;
    nodeEls.style("display", d => f === "all" || d.type === f ? null : "none");
    linkEls.style("display", e => {
      if (f === "all") return null;
      const s = nodeById[e.sourceId], t = nodeById[e.targetId];
      return (s.type === f || t.type === f) ? null : "none";
    });
  });
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
function clearSearch() {
  document.getElementById("search").value = "";
  nodeEls.classed("dimmed highlighted", false);
  linkEls.classed("dimmed", false);
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { clearSearch(); return; }
  const matches = new Set(NODES.filter(n => n.name.toLowerCase().includes(q)).map(n => n.id));
  nodeEls.classed("dimmed", d => !matches.has(d.id));
  nodeEls.classed("highlighted", d => matches.has(d.id));
  linkEls.classed("dimmed", e => !matches.has(e.sourceId) && !matches.has(e.targetId));
});

// ── PANEL ─────────────────────────────────────────────────────────────────────
const typeLabels = {raw:"Recurso Crudo", advanced:"Recurso Avanzado", tile:"Casilla Avanzada", invention:"Invento", tech:"Tecnología", victory:"🏆 Victoria"};
const typeBadgeColors = {raw:"#4ade80", advanced:"#22d3ee", tile:"#0d9488", invention:"#fb923c", tech:"#60a5fa", victory:"#fbbf24"};
const edgeTypeLabels = {cost:"Coste", prereq:"Prerrequisito", "prereq-inv":"Prereq. Invento", enables:"Desbloquea", produces:"Produce"};

function showPanel(d) {
  const panel = document.getElementById("panel");

  // Find incoming/outgoing edges
  const incoming = edges.filter(e => e.targetId === d.id);
  const outgoing = edges.filter(e => e.sourceId === d.id);

  const prereqs   = incoming.filter(e => e.type === "prereq").map(e => nodeById[e.sourceId]);
  const prereqInv = incoming.filter(e => e.type === "prereq-inv").map(e => nodeById[e.sourceId]);
  const unlocks   = outgoing.filter(e => e.type === "enables" || e.type === "prereq").map(e => nodeById[e.targetId]);
  const produces  = outgoing.filter(e => e.type === "produces").map(e => nodeById[e.targetId]);
  const usedIn    = outgoing.filter(e => e.type === "cost").map(e => nodeById[e.targetId]);
  const prereqFor = outgoing.filter(e => e.type === "prereq-inv").map(e => nodeById[e.targetId]);

  const badge = `<span class="badge" style="background:${typeBadgeColors[d.type]}">${typeLabels[d.type]}</span>`;

  let html = `<h2>${d.name}</h2>${badge}<div style="color:#6b7280;font-size:11px;margin-top:4px">Tier ${d.tier}</div>`;

  // ── COSTES: leemos directamente de d.costs (fuente de verdad)
  if (d.costs && Object.keys(d.costs).length > 0) {
    html += `<div class="section-title">Coste de construcción</div>`;
    Object.entries(d.costs).forEach(([resId, qty]) => {
      const resNode = nodeById[resId];
      const resName = resNode ? resNode.name : resId;
      html += `<div class="item cost" style="display:flex;justify-content:space-between;align-items:center">
        <span>${resName}</span>
        <span style="color:#fbbf24;font-weight:bold;margin-left:8px">×${qty}</span>
      </div>`;
    });
  } else if (d.type === "invention" || d.type === "victory") {
    html += `<div class="section-title">Coste de construcción</div>
    <div style="color:#6b7280;font-style:italic;font-size:12px;padding:4px 8px">Sin coste en recursos</div>`;
  }

  if (prereqInv.length) {
    html += `<div class="section-title">Requiere inventos</div>`;
    prereqInv.forEach(n => html += `<div class="item" style="border-color:#f59e0b">${n.name}</div>`);
  }

  if (prereqs.length) {
    html += `<div class="section-title">Requiere tecnología</div>`;
    prereqs.forEach(n => html += `<div class="item">${n.name}</div>`);
  }

  if (unlocks.length) {
    html += `<div class="section-title">Desbloquea</div>`;
    unlocks.forEach(n => html += `<div class="item" style="border-color:#a78bfa">${n.name}</div>`);
  }

  if (produces.length) {
    html += `<div class="section-title">Produce</div>`;
    produces.forEach(n => html += `<div class="item" style="border-color:#22d3ee">${n.name}</div>`);
  }

  if (usedIn.length) {
    html += `<div class="section-title">Usado como coste en</div>`;
    usedIn.forEach(n => html += `<div class="item" style="border-color:#fb923c">${n.name}</div>`);
  }

  if (prereqFor.length) {
    html += `<div class="section-title">Prerrequisito para</div>`;
    prereqFor.forEach(n => html += `<div class="item" style="border-color:#f59e0b">${n.name}</div>`);
  }

  if (d.type === "raw") {
    html += `<div class="section-title">Fuente</div><div class="item" style="border-color:${groupColors[d.group]||'#888'}">${d.group}</div>`;
  }

  panel.innerHTML = html;
}
</script>

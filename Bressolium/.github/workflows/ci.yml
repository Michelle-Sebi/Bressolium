name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'refactor/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (PHP 8.4)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/BressoliumProject

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, mbstring, xml, ctype, fileinfo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/BressoliumProject/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/BressoliumProject/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests (Pest)
        run: ./vendor/bin/pest

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/bressolium-front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/bressolium-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
